<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1200px; height: 630px; overflow: hidden; }
        body {
            background: #0A0A0A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 100px;
            position: relative;
        }
        .glow {
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(226, 54, 54, 0.12) 0%, transparent 70%);
        }
        .label {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #FF5050;
            margin-bottom: 28px;
        }
        h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: #E8E4DF;
            max-width: 800px;
            margin-bottom: 32px;
        }
        .sub {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.5;
            color: #8A857F;
            max-width: 600px;
        }
        .logo {
            position: absolute;
            top: 510px;
            right: 100px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #E8E4DF;
        }
        .logo .prefix {
            color: #E23636;
            font-weight: 800;
            margin-right: 0.08em;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <p class="label">Independence, not dependency</p>
    <h1>You don't have a creative problem. You have a clarity problem.</h1>
    <p class="sub">An audience strategist, a brand strategist, and a creative director — built around your business.</p>
    <div class="logo"><span class="prefix">/</span>RedSlash</div>
</body>
</html>
