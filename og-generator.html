<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

        #og {
            width: 1200px;
            height: 630px;
            background: #0A0A0A;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 100px;
        }

        .og-label {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #FF5050;
            margin-bottom: 28px;
        }

        .og-headline {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: #E8E4DF;
            max-width: 800px;
            margin-bottom: 32px;
        }

        .og-sub {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.5;
            color: #8A857F;
            max-width: 600px;
        }

        .og-logo {
            position: absolute;
            bottom: 72px;
            right: 100px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #E8E4DF;
        }

        .og-logo .prefix {
            color: #E23636;
            font-weight: 800;
            margin-right: 0.08em;
        }

        /* Subtle red glow in top-right corner */
        .og-glow {
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(226, 54, 54, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        #download-btn {
            margin-top: 32px;
            padding: 14px 28px;
            background: #E23636;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        #download-btn:hover { background: #CC2E2E; }
    </style>
</head>
<body>

    <div id="og">
        <div class="og-glow"></div>
        <p class="og-label">Independence, not dependency</p>
        <h1 class="og-headline">You don't have a creative problem. You have a clarity problem.</h1>
        <p class="og-sub">An audience strategist, a brand strategist, and a creative director — built around your business.</p>
        <div class="og-logo"><span class="prefix">/</span>RedSlash</div>
    </div>

    <button id="download-btn">Download OG Image (1200×630)</button>

    <script>
        document.getElementById('download-btn').addEventListener('click', async () => {
            const el = document.getElementById('og');
            const canvas = document.createElement('canvas');
            canvas.width = 1200;
            canvas.height = 630;
            const ctx = canvas.getContext('2d');

            // Use html2canvas-style approach: render to foreignObject in SVG
            const data = new XMLSerializer().serializeToString(el);
            const styles = document.querySelectorAll('style, link[rel="stylesheet"]');
            let styleText = '';
            for (const s of styles) {
                if (s.tagName === 'STYLE') styleText += s.outerHTML;
            }

            // Fetch font CSS and inline it
            const fontCSS = await fetch('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:wght@300;400;500;600;700&display=swap')
                .then(r => r.text());

            const svgString = `
                <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
                    <style>${fontCSS}</style>
                    ${styleText}
                    <foreignObject width="1200" height="630">
                        ${new XMLSerializer().serializeToString(el)}
                    </foreignObject>
                </svg>
            `;

            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = 'og-image.png';
                a.click();
            };
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
        });
    </script>

</body>
</html>
